kind = "web"
previewPath = "/"
title = "Architecture Firm Website"
version = "1.0.0"
id = "artifacts/architect-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22262

[services.development]
run = "pnpm --filter @workspace/architect-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/architect-site", "run", "build" ]
publicDir = "artifacts/architect-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22262"
BASE_PATH = "/"
